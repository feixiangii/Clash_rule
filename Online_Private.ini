;不要随意改变关键字，否则会导致出错
;基于 ACL4SSR 风格 + blackmatrix7/ios_rule_script 规则集（完整增强版）

;去广告：支持（含知乎广告）
;自动测速：支持
;微软分流：支持
;苹果分流：支持（含 AppleTV / AppleMusic）
;增强中国IP段：支持（BGP路由，每日更新）
;增强国外GFW：支持
;社交媒体：支持（Twitter / Facebook / Instagram / Discord）
;流媒体：支持（Disney+ / Spotify / TikTok 新增）

